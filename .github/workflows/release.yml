name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.1)'
        required: true
        type: string
      pre_release:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*.*.*'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION=${{ github.event.inputs.version }}
            IS_PRERELEASE=${{ github.event.inputs.pre_release }}
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            IS_PRERELEASE=$(echo "$VERSION" | grep -q 'alpha\|beta\|rc' && echo 'true' || echo 'false')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "📦 Release Version: $VERSION (Pre-release: $IS_PRERELEASE)"

      - name: Generate changelog
        id: changelog
        run: |
          if [ -f "CHANGELOG.md" ]; then
            CHANGELOG=$(head -50 CHANGELOG.md)
          else
            CHANGELOG="See commits for changes"
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  test:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Type check
        run: |
          cd web
          npx tsc --noEmit

      - name: Build web app
        run: |
          cd web
          npm run build

  build-android-apk:
    needs: test
    uses: ./.github/workflows/build-android-apk.yml
    with:
      build_type: 'debug'
    secrets: inherit

  build-android-aab:
    needs: test
    uses: ./.github/workflows/build-android-aab.yml
    secrets: inherit

  build-ios:
    needs: test
    uses: ./.github/workflows/build-ios.yml
    secrets: inherit

  release:
    needs: [prepare, build-android-apk, build-android-aab, build-ios]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: artifacts/
        continue-on-error: true

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: artifacts/
        continue-on-error: true

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: artifacts/
        continue-on-error: true

      - name: Create release notes
        id: release_notes
        run: |
          echo "## 🎉 Quidec v${{ needs.prepare.outputs.version }}" > release_notes.md
          echo "" >> release_notes.md
          echo "### 📋 Release Information" >> release_notes.md
          echo "- **Version:** ${{ needs.prepare.outputs.version }}" >> release_notes.md
          echo "- **Release Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> release_notes.md
          echo "- **Pre-release:** ${{ needs.prepare.outputs.is_prerelease }}" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 Builds Included" >> release_notes.md
          echo "- ✅ Android Debug APK" >> release_notes.md
          echo "- ✅ Android App Bundle (Play Store)" >> release_notes.md
          echo "- ✅ iOS App Archive (TestFlight)" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📝 Changelog" >> release_notes.md
          echo "${{ needs.prepare.outputs.changelog }}" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 🚀 Installation" >> release_notes.md
          echo "- **Android:** Download APK or use Google Play Store" >> release_notes.md
          echo "- **iOS:** Available on TestFlight and App Store" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          body_path: release_notes.md
          tag_name: v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release report
        run: |
          echo "## 🎊 Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.prepare.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Pre-release:** ${{ needs.prepare.outputs.is_prerelease }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Available Downloads" >> $GITHUB_STEP_SUMMARY
          if ls artifacts/*.apk &>/dev/null; then
            echo "- Android APK: $(ls artifacts/*.apk | xargs -I {} basename {})" >> $GITHUB_STEP_SUMMARY
          fi
          if ls artifacts/*.aab &>/dev/null; then
            echo "- Android AAB: $(ls artifacts/*.aab | xargs -I {} basename {})" >> $GITHUB_STEP_SUMMARY
          fi
          if ls artifacts/*.ipa &>/dev/null; then
            echo "- iOS IPA: $(ls artifacts/*.ipa | xargs -I {} basename {})" >> $GITHUB_STEP_SUMMARY
          fi

  notify:
    needs: release
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Slack notification
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Release failed for Quidec v${{ needs.prepare.outputs.version }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Release Failed*\n*Version:* ${{ needs.prepare.outputs.version }}\n*Repository:* ${{ github.repository }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Success notification
        if: success()
        run: |
          echo "✅ Release completed successfully!"
          echo "Version: ${{ needs.prepare.outputs.version }}"
