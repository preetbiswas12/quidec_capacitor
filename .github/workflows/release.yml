name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.1)'
        required: true
        type: string
      pre_release:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_PRERELEASE: ${{ github.event.inputs.pre_release }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            IS_PRERELEASE="$INPUT_PRERELEASE"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            IS_PRERELEASE=$(echo "$VERSION" | grep -qE 'alpha|beta|rc' && echo 'true' || echo 'false')
          fi

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

  test:
    needs: prepare
    uses: ./.github/workflows/ci.yml

  build-android-aab:
    needs: [prepare, test]
    uses: ./.github/workflows/build-android-aab.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  build-android-apk:
    needs: test
    uses: ./.github/workflows/build-android-apk.yml
    with:
      build_type: release
    secrets: inherit

  build-ios:
    needs: test
    uses: ./.github/workflows/build-ios.yml
    with:
      build_config: 'Release'
    secrets: inherit

  release:
    needs: [prepare, build-android-aab, build-android-apk, build-ios]
    runs-on: ubuntu-latest
    if: |
      !cancelled() && (
        needs.build-android-aab.result == 'success' ||
        needs.build-android-apk.result == 'success' ||
        needs.build-ios.result == 'success'
      )

    steps:
      - uses: actions/checkout@v7

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: artifacts/
        continue-on-error: true

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: artifacts/
        continue-on-error: true

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: artifacts/
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Quidec v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          generate_release_notes: true
