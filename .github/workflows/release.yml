name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.1)'
        required: true
        type: string
      pre_release:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION=${{ github.event.inputs.version }}
            IS_PRERELEASE=${{ github.event.inputs.pre_release }}
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            IS_PRERELEASE=$(echo "$VERSION" | grep -qE 'alpha|beta|rc' && echo 'true' || echo 'false')
          fi
          
          # Validate version format
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "❌ Invalid version format: $VERSION"
            exit 1
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "📦 Release Version: $VERSION (Pre-release: $IS_PRERELEASE)"

      - name: Generate changelog
        id: changelog
        run: |
          if [ -f "CHANGELOG.md" ]; then
            CHANGELOG=$(head -50 CHANGELOG.md)
          else
            CHANGELOG="See commits for changes"
          fi
          
          # Properly escape multi-line output
          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

  test:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm           # ← MUST COME FIRST
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Install dependencies (fallback)
        if: failure()
        run: |
          echo "⚠️ Frozen lockfile failed, installing with updates"
          pnpm install
          git add pnpm-lock.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git commit -m "chore: update pnpm-lock.yaml" || true

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build web app
        run: pnpm build

  build-android-apk:
    needs: test
    uses: ./.github/workflows/build-android-apk.yml
    with:
      build_type: 'debug'
    secrets: inherit

  build-android-aab:
    needs: [prepare, test]
    uses: ./.github/workflows/build-android-aab.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  build-ios:
    needs: test
    uses: ./.github/workflows/build-ios.yml
    with:
      build_config: 'Release'
    secrets: inherit

  release:
    needs: [prepare, build-android-apk, build-android-aab, build-ios]
    runs-on: ubuntu-latest
    if: always()

    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: artifacts/
        continue-on-error: true

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: artifacts/
        continue-on-error: true

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: artifacts/
        continue-on-error: true

      - name: Verify artifacts
        run: |
          echo "📦 Downloaded artifacts:"
          ls -lh artifacts/ || echo "No artifacts found"

      - name: Create release notes
        id: release_notes
        run: |
          {
            echo "## 🎉 Quidec v${{ needs.prepare.outputs.version }}"
            echo ""
            echo "### 📋 Release Information"
            echo "- **Version:** ${{ needs.prepare.outputs.version }}"
            echo "- **Release Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo "- **Pre-release:** ${{ needs.prepare.outputs.is_prerelease }}"
            echo ""
            echo "### 📦 Builds Included"
            [ -f "artifacts/"*.apk ] && echo "- ✅ Android Debug APK" || echo "- ⚠️ Android Debug APK"
            [ -f "artifacts/"*.aab ] && echo "- ✅ Android App Bundle (Play Store)" || echo "- ⚠️ Android App Bundle"
            [ -f "artifacts/"*.ipa ] && echo "- ✅ iOS App Archive (TestFlight)" || echo "- ⚠️ iOS App Archive"
            echo ""
            echo "### 📝 Changelog"
            echo "${{ needs.prepare.outputs.changelog }}"
            echo ""
            echo "### 🚀 Installation"
            echo "- **Android:** Download APK or use Google Play Store"
            echo "- **iOS:** Available on TestFlight and App Store"
          } >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          body_path: release_notes.md
          tag_name: v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release report
        run: |
          {
            echo "## 🎊 Release Complete"
            echo ""
            echo "**Version:** v${{ needs.prepare.outputs.version }}"
            echo "**Pre-release:** ${{ needs.prepare.outputs.is_prerelease }}"
            echo ""
            echo "### 📦 Available Downloads"
            for file in artifacts/*; do
              if [ -f "$file" ]; then
                echo "- $(basename "$file"): $(du -h "$file" | cut -f1)"
              fi
            done
          } >> $GITHUB_STEP_SUMMARY

  notify:
    needs: [prepare, release]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Slack failure notification
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Release failed for Quidec v${{ needs.prepare.outputs.version }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Release Failed*\n*Version:* ${{ needs.prepare.outputs.version }}\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref }}"
                  }
                }
              ]
            }
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Slack success notification
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Release successful for Quidec v${{ needs.prepare.outputs.version }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Release Successful*\n*Version:* ${{ needs.prepare.outputs.version }}\n*Repository:* ${{ github.repository }}"
                  }
                }
              ]
            }
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true