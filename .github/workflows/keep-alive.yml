name: Keep Render Relay Alive

on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Render relay
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "⚠️ RENDER_URL not set — skipping keep-alive ping"
            exit 0
          fi

          # Ensure URL has no trailing slash for consistency
          URL="${RENDER_URL%/}"

          echo "🏓 Pinging $URL/..."
          HTTP_CODE=$(curl -s -o /tmp/relay-ping.json -w "%{http_code}" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            "$URL/" 2>&1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response:"
          cat /tmp/relay-ping.json 2>/dev/null || echo "(no response body)"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Relay is alive"
          else
            echo "⚠️ Relay returned HTTP $HTTP_CODE — may be spinning up or down"
          fi
