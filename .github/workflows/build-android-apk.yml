name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - staging

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Xmx2g -Dorg.gradle.daemon=false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Install web dependencies
        run: |
          npm install
          npm install -D typescript

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Build web app
        run: |
          npm run build

      # ❌ Removed global Capacitor install (can cause version mismatch)

      - name: Sync Capacitor
        run: |
          npx cap sync android

      # ❌ Removed cache deletion step (this was breaking your build)

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon --refresh-dependencies

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT

      - name: Copy APK to web folder
        run: |
          mkdir -p dist/apk
          cp ${{ steps.apk.outputs.apk_path }} dist/apk/

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      - name: Comment on commit
        if: always()
        run: |
          echo "APK built: ${{ steps.apk.outputs.apk_name }}"