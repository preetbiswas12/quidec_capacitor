name: Build Android APK

on:
  push:
    branches: [main, develop, staging]
  workflow_call:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: false
        type: string
        default: 'debug'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        type: choice
        default: 'debug'
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    env:
      GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4 -Dorg.gradle.vfs.watch=false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # pnpm MUST be set up before setup-node so node caching works correctly
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Install SDK 36 to match variables.gradle (compileSdkVersion = 36)
      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Install dependencies
        run: NODE_ENV=development pnpm install --frozen-lockfile || (echo "⚠️ Frozen lockfile failed, installing with updates" && NODE_ENV=development pnpm install)

      - name: Verify Capacitor config
        run: |
          if [ ! -f capacitor.config.ts ] && [ ! -f capacitor.config.json ]; then
            echo "❌ Error: capacitor.config.ts or capacitor.config.json not found!"
            exit 1
          fi
          echo "✅ Capacitor config found"
          ls -la capacitor.config.* 2>/dev/null || echo "Config files verified"

      - name: Build web app
        run: pnpm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_TURN_USERNAME: ${{ secrets.VITE_TURN_USERNAME }}
          VITE_TURN_CREDENTIAL: ${{ secrets.VITE_TURN_CREDENTIAL }}
          VITE_VAPID_KEY: ${{ secrets.VITE_VAPID_KEY }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL || 'wss://quidec-server.onrender.com' }}

      - name: Clean old Capacitor Android files
        run: |
          echo "Cleaning previous Capacitor Android plugin files..."
          rm -rf android/capacitor-cordova-android-plugins 2>/dev/null || true
          echo "✅ Old files cleaned"

      - name: Sync Capacitor
        run: |
          echo "Running Capacitor sync..."
          npx cap sync android
          echo "✅ Capacitor sync completed"

      - name: Verify Capacitor generated files
        run: |
          echo "Verifying generated Capacitor files..."
          if [ ! -d "android/capacitor-cordova-android-plugins" ]; then
            echo "⚠️ Warning: capacitor-cordova-android-plugins directory not created"
          fi
          if [ ! -f "android/capacitor-cordova-android-plugins/cordova.variables.gradle" ]; then
            echo "⚠️ Warning: cordova.variables.gradle not found, attempting to create..."
            mkdir -p android/capacitor-cordova-android-plugins
            touch android/capacitor-cordova-android-plugins/cordova.variables.gradle
            echo "// Auto-generated by workflow" >> android/capacitor-cordova-android-plugins/cordova.variables.gradle
          fi
          ls -la android/capacitor-cordova-android-plugins/ || echo "Directory listing failed"

      # Upgrade Gradle wrapper to 8.11 — required for AGP 8.4.2 + SDK 36
      - name: Upgrade Gradle wrapper to 8.11
        run: |
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.11-bin.zip|g' \
            android/gradle/wrapper/gradle-wrapper.properties
          echo "✅ Gradle wrapper upgraded to 8.11"

      # Upgrade Android Gradle Plugin and patch BouncyCastle conflict
      - name: Upgrade Android Gradle Plugin
        run: |
          sed -i "s|com.android.tools.build:gradle:[0-9.]*|com.android.tools.build:gradle:8.4.2|g" android/build.gradle || true
          echo "configurations.all { resolutionStrategy { force 'org.bouncycastle:bcprov-jdk18on:1.78' } }" >> android/build.gradle
          echo "✅ Android Gradle Plugin upgraded to 8.4.2"

      - name: Validate keystore secret (Release)
        if: inputs.build_type == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ Error: KEYSTORE_BASE64 secret is not set for release build"
            exit 1
          fi
          echo "✅ Keystore secret validated"

      - name: Decode keystore (Release)
        if: inputs.build_type == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/my-release-key.keystore
          if [ ! -f android/app/my-release-key.keystore ]; then
            echo "❌ Error: Failed to decode keystore"
            exit 1
          fi
          echo "✅ Keystore decoded successfully"

      - name: Clean Gradle cache before build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean --no-daemon 2>&1 | tail -20 || echo "⚠️ Gradle clean had issues but continuing"
          echo "✅ Gradle cache cleaned"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          BUILD_TYPE=${{ inputs.build_type || 'debug' }}
          echo "Starting $BUILD_TYPE APK build..."
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" --stacktrace
          else
            ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" --stacktrace
          fi
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "❌ Gradle build failed with exit code $BUILD_EXIT"
            exit $BUILD_EXIT
          fi
          echo "✅ APK build completed successfully"
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/my-release-key.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Locate APK
        id: apk
        run: |
          echo "Searching for APK files..."
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found!"
            echo "Build outputs directory structure:"
            find android/app/build/outputs -type f 2>/dev/null || echo "No build outputs found"
            exit 1
          fi
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          APK_NAME=$(basename "$APK_PATH")
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "✅ APK found: $APK_NAME ($APK_SIZE)"

      - name: Verify APK integrity
        if: success()
        run: |
          APK_FILE="${{ steps.apk.outputs.apk_path }}"
          if [ ! -f "$APK_FILE" ]; then
            echo "❌ APK file not accessible"
            exit 1
          fi
          FILE_SIZE=$(stat -f%z "$APK_FILE" 2>/dev/null || stat -c%s "$APK_FILE")
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "❌ APK file is suspiciously small: $FILE_SIZE bytes"
            exit 1
          fi
          echo "✅ APK integrity verified (size: $FILE_SIZE bytes)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Build Report
        if: always()
        run: |
          echo "## 📱 Android APK Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Type:** ${{ inputs.build_type || 'debug' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.apk.outputs.apk_name }}" ]; then
            echo "**APK Name:** ${{ steps.apk.outputs.apk_name }}" >> $GITHUB_STEP_SUMMARY
            echo "**APK Size:** ${{ steps.apk.outputs.apk_size }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Build Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Build completed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build failed. Please check the logs above." >> $GITHUB_STEP_SUMMARY
          fi