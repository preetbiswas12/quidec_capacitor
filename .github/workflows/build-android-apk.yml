name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - develop
      - staging
      - main
    paths:
      - 'web/src/**'
      - 'web/package.json'
      - '.github/workflows/build-android-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      checks: write
      pull-requests: write

    env:
      GRADLE_OPTS: "-Xmx2g -Dorg.gradle.daemon=false"
      NODE_ENV: production
      VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL || 'wss://quidec-server.onrender.com' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.m2/repository
            ~/.npm
            node_modules
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: |
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-disabled: false

      - name: Install web dependencies
        run: |
          cd web
          npm ci
          npm install -D typescript

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Type check
        run: |
          cd web
          npx tsc --noEmit
        continue-on-error: true

      - name: Build web app (Vite)
        run: |
          cd web
          npm run build
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL || 'wss://quidec-server.onrender.com' }}

      - name: Sync Capacitor
        run: |
          cd web
          npx cap sync android

      - name: Update Android build config
        run: |
          cd web/android
          # Update compileSdk
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' app/build.gradle || true
          sed -i 's/compileSdk 34/compileSdk 35/g' app/build.gradle || true
          # Ensure Gradle wrapper is correct
          sed -i 's|gradle-.*-bin.zip|gradle-8.6-bin.zip|g' gradle/wrapper/gradle-wrapper.properties

      - name: Setup signing config
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            cd web
            echo "$KEYSTORE_BASE64" | base64 -d > android/keystore.jks
            echo "SIGNING_CONFIGURED=true" >> $GITHUB_ENV
            echo "✅ Keystore configured"
          else
            echo "⚠️ Keystore not available - will build debug APK"
          fi

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'debug' || github.event_name == 'push'
        run: |
          cd web/android
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            --no-build-cache \
            --parallel \
            -g /tmp/gradle-cache \
            -Dorg.gradle.jvmargs="-Xmx2g" \
            -Dorg.gradle.workers.max=4

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release' && env.SIGNING_CONFIGURED == 'true'
        run: |
          cd web/android
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            --no-build-cache \
            --parallel \
            -g /tmp/gradle-cache \
            -Dorg.gradle.jvmargs="-Xmx2g" \
            -Dorg.gradle.workers.max=4
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/web/android/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find web/android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found!"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          echo "apk_size=$(du -h $APK_PATH | cut -f1)" >> $GITHUB_OUTPUT

      - name: Copy APK to dist
        run: |
          mkdir -p web/dist/apk
          cp ${{ steps.apk.outputs.apk_path }} web/dist/apk/

      - name: Generate APK report
        run: |
          echo "## 📦 APK Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK Name:** ${{ steps.apk.outputs.apk_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**APK Size:** ${{ steps.apk.outputs.apk_size }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** $(date)" >> $GITHUB_STEP_SUMMARY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Post build status
        if: always()
        run: |
          if [ -f "${{ steps.apk.outputs.apk_path }}" ]; then
            echo "✅ APK build succeeded: ${{ steps.apk.outputs.apk_name }}"
          else
            echo "❌ APK build failed"
            exit 1
          fi