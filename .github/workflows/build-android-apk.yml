name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    env:
      GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4"
      # REMOVED global NODE_ENV: production to allow devDependencies (Vite) to install

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      # INSTALL DEPENDENCIES
      - name: Install dependencies
        # Force install all dependencies (including Vite) needed for the build
        run: pnpm install --no-frozen-lockfile --production=false

      # BUILD WEB
      - name: Build web app
        # Only set production environment here for the actual build process
        run: NODE_ENV=production pnpm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_VAPID_KEY: ${{ secrets.VITE_VAPID_KEY }}

      # CAPACITOR SYNC
      - name: Sync Capacitor
        run: |
          pnpm exec cap add android || true
          pnpm exec cap sync android

      - name: Update Android SDK to 35
        run: |
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' android/app/build.gradle || true
          sed -i 's/compileSdk 34/compileSdk 35/g' android/app/build.gradle || true

      # NATIVE BUILD
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon

      # LOCATE AND UPLOAD
      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found!"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          echo "apk_size=$(du -h "$APK_PATH" | cut -f1)" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      - name: Build Report
        if: always()
        run: |
          echo "## 📱 Android APK Build Report" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "**APK:** ${{ steps.apk.outputs.apk_name }} (${{ steps.apk.outputs.apk_size }})" >> $GITHUB_STEP_SUMMARY
          fi
