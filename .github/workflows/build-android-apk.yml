name: Build Android APK

on:
  push:
    branches: [main, develop, staging]
  workflow_call:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: false
        type: string
        default: 'debug'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        type: choice
        default: 'debug'
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4 -Dorg.gradle.vfs.watch=false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Install dependencies
        run: pnpm install

      - name: Build web app
        run: pnpm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_TURN_USERNAME: ${{ secrets.VITE_TURN_USERNAME }}
          VITE_TURN_CREDENTIAL: ${{ secrets.VITE_TURN_CREDENTIAL }}
          VITE_VAPID_KEY: ${{ secrets.VITE_VAPID_KEY }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL || 'wss://quidec-server.onrender.com' }}

      - name: Clean Android artifacts
        run: rm -rf android/app/src/main/assets/public 2>/dev/null || true

      - name: Sync Capacitor
        run: pnpm exec cap sync android

      - name: Update Gradle wrapper
        run: sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          BUILD_TYPE="${{ inputs.build_type || 'debug' }}"
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace --info --max-workers 1 2>&1
          else
            ./gradlew assembleDebug --no-daemon --stacktrace --info --max-workers 1 2>&1
          fi
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/my-release-key.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Show Kotlin compiler errors
        if: failure()
        run: |
          echo "=== Searching for Kotlin compiler output files ==="
          find android -name "*.log" -o -name "kotlin-compiler*.txt" 2>/dev/null | head -20
          echo "=== Searching build reports ==="
          find android -path "*/build/reports/*" -type f 2>/dev/null | head -20
          echo "=== Looking for filesystem compile errors specifically ==="
          find android -path "*capacitor-filesystem*" -path "*/build/*" -name "*.log" -type f 2>/dev/null | xargs cat 2>/dev/null || true
          echo "=== Kotlin daemon logs ==="
          find /tmp -name "kotlin-daemon*" -type f 2>/dev/null | xargs tail -50 2>/dev/null || true
          find ~/.gradle -name "kotlin-daemon*" -type f 2>/dev/null | xargs tail -50 2>/dev/null || true

      - name: Find APK
        id: apk
        run: |
          echo "=== Searching entire android directory for APKs ==="
          find android -name "*.apk" -type f 2>/dev/null || echo "No APKs found anywhere in android/"
          echo "=== Done searching ==="
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found in expected location"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename "$APK_PATH")" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          echo "## Android APK Build" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "APK: ${{ steps.apk.outputs.apk_name }}" >> $GITHUB_STEP_SUMMARY