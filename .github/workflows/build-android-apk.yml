name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - staging

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install web dependencies
        run: |
          npm install

      - name: Build web app
        run: |
          npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find web/android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT

      - name: Copy APK to web folder
        run: |
          mkdir -p web/dist/apk
          cp ${{ steps.apk.outputs.apk_path }} web/dist/apk/

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      - name: Comment on commit
        if: always()
        run: |
          echo "APK built: ${{ steps.apk.outputs.apk_name }}"
