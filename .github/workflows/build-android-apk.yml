name: Build Android APK

on:
  push:
    branches: [main, develop, staging]
  workflow_call:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: false
        type: string
        default: 'debug'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        type: choice
        default: 'debug'
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    env:
      GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4 -Dorg.gradle.vfs.watch=false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Java ────────────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # ─── Node ────────────────────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # ─── Android SDK ─────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      # ─── Validate .env ───────────────────────────────────────────────────────
      - name: Validate .env placeholders replaced
        run: |
          ERRORS=0
          if grep -q "your-app.onrender.com" .env 2>/dev/null; then
            echo "❌ VITE_NOTIFY_URL still has placeholder value"
            ERRORS=1
          fi
          if grep -q "YOUR_EXPRESSTURN" .env 2>/dev/null; then
            echo "❌ TURN placeholder found in .env"
            ERRORS=1
          fi
          if [ "$ERRORS" = "1" ]; then exit 1; fi
          echo "✅ .env validated"

      # ─── Install dependencies ────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          NODE_ENV=development pnpm install --frozen-lockfile || (
            echo "⚠️ Frozen lockfile failed, installing with updates"
            NODE_ENV=development pnpm install
          )

      # ─── Build web app ───────────────────────────────────────────────────────
      - name: Build web app
        run: pnpm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_VAPID_KEY: ${{ secrets.VITE_VAPID_KEY }}
          VITE_NOTIFY_URL: ${{ secrets.VITE_NOTIFY_URL }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL || 'wss://quidec-server.onrender.com' }}

      # ─── Sync Capacitor ──────────────────────────────────────────────────────
      - name: Clean old web assets
        run: rm -rf android/app/src/main/assets/public

      - name: Sync Capacitor
        run: pnpm exec cap sync android

      # ─── Build APK ───────────────────────────────────────────────────────────
      - name: Build APK (${{ inputs.build_type || 'debug' }})
        run: |
          cd android
          chmod +x gradlew
          BUILD_TYPE="${{ inputs.build_type || 'debug' }}"
          if [ "$BUILD_TYPE" = "release" ]; then
            echo "🔒 Building release APK (requires KEYSTORE_* secrets)..."
            ./gradlew assembleRelease --no-daemon --stacktrace --max-workers 1
          else
            echo "🔧 Building debug APK..."
            ./gradlew assembleDebug --no-daemon --stacktrace --max-workers 1
          fi

      # ─── Locate APK ──────────────────────────────────────────────────────────
      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found in android/app/build/outputs/apk/"
            echo "=== Searching entire android directory ==="
            find android -name "*.apk" -type f 2>/dev/null || echo "No APKs found anywhere"
            exit 1
          fi
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename "$APK_PATH")" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          echo "✅ APK found: $APK_PATH ($APK_SIZE)"

      # ─── Upload artifact ─────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      # ─── Summary ─────────────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## 📱 Android APK Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type | ${{ inputs.build_type || 'debug' }} |" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.apk.outputs.apk_name }}" ]; then
            echo "| APK | ${{ steps.apk.outputs.apk_name }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Size | ${{ steps.apk.outputs.apk_size }} |" >> $GITHUB_STEP_SUMMARY
          fi
