name: Build Android APK

on:
  push:   # runs on every commit
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read

    env:
      GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"
      NODE_ENV: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ pnpm (version comes from package.json)
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # JAVA
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ANDROID
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # GRADLE
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # INSTALL DEPENDENCIES
      - name: Install dependencies
        id: install_deps
        run: pnpm install --frozen-lockfile

      - name: Fallback install
        if: ${{ failure() }}
        run: pnpm install

      # BUILD WEB
      - name: Build web app
        run: pnpm build
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}

      # CAPACITOR
      - name: Ensure Android project exists
        run: pnpm exec cap add android || true

      - name: Sync Capacitor
        run: pnpm exec cap sync android

      # BUILD DEBUG APK (no signing needed for CI)
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon

      # LOCATE APK
      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" -type f | head -1)

          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found!"
            exit 1
          fi

          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      # UPLOAD APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error