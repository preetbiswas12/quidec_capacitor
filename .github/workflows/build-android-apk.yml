name: Build Android APK

on:
  push:
    branches: [main, develop, staging]
  workflow_call:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: false
        type: string
        default: 'debug'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        type: choice
        default: 'debug'
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    env:
      GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4 -Dorg.gradle.vfs.watch=false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Install dependencies
        run: NODE_ENV=development pnpm install --frozen-lockfile || (echo "Frozen lockfile failed, installing with updates" && NODE_ENV=development pnpm install)

      - name: Verify Capacitor config exists
        run: |
          if [ ! -f capacitor.config.ts ] && [ ! -f capacitor.config.json ]; then
            echo "Error: capacitor.config.ts or capacitor.config.json not found!"
            exit 1
          fi
          echo "Capacitor config found"

      - name: Build web app
        run: pnpm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_TURN_USERNAME: ${{ secrets.VITE_TURN_USERNAME }}
          VITE_TURN_CREDENTIAL: ${{ secrets.VITE_TURN_CREDENTIAL }}
          VITE_VAPID_KEY: ${{ secrets.VITE_VAPID_KEY }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL || 'wss://quidec-server.onrender.com' }}

      - name: Clean old Capacitor directories
        run: |
          rm -rf android/capacitor-cordova-android-plugins 2>/dev/null || true
          rm -rf android/.capacitor 2>/dev/null || true
          echo "Cleaned old files"

      - name: Sync Capacitor to Android
        run: |
          echo "Running: pnpm exec cap sync android"
          pnpm exec cap sync android 2>&1 || echo "Capacitor sync had issues, continuing..."

      - name: Create Capacitor Gradle plugin structure
        run: |
          # Create the plugin module directory
          mkdir -p android/capacitor-cordova-android-plugins
          
          # Create cordova.variables.gradle
          cat > android/capacitor-cordova-android-plugins/cordova.variables.gradle << 'EOF'
          ext {
              cdvMinSdkVersion = 21
              cdvMaxSdkVersion = 34
              cdvCompileSdkVersion = 36
          }
          EOF

          # Create build.gradle for the capacitor plugin module (CRITICAL)
          cat > android/capacitor-cordova-android-plugins/build.gradle << 'EOF'
          apply plugin: 'com.android.library'
          android {
            compileSdk = 36

           defaultConfig {
             minSdk = 21
             targetSdk = 34
            }

            compileOptions {
              sourceCompatibility JavaVersion.VERSION_11
              targetCompatibility JavaVersion.VERSION_11
            }
          }

          dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'androidx.core:core:1.10.1'
          }
          EOF

          # Create settings.gradle if it doesn't include the plugin
          if ! grep -q "capacitor-cordova-android-plugins" android/settings.gradle 2>/dev/null; then
            echo "include ':capacitor-cordova-android-plugins'" >> android/settings.gradle
            echo "project(':capacitor-cordova-android-plugins').projectDir = new File(rootDir, 'capacitor-cordova-android-plugins')" >> android/settings.gradle
          fi

          echo "Created Capacitor plugin Gradle structure"

      - name: Upgrade Gradle wrapper to 8.11
        run: |
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.11-bin.zip|g' android/gradle/wrapper/gradle-wrapper.properties
            echo "Gradle wrapper upgraded to 8.11"
          fi

      - name: Update Android Gradle Plugin
        run: |
          if [ -f "android/build.gradle" ]; then
            sed -i "s|com.android.tools.build:gradle:[0-9.]*|com.android.tools.build:gradle:8.4.2|g" android/build.gradle || true
            
            if ! grep -q "resolutionStrategy" android/build.gradle; then
              cat >> android/build.gradle << 'EOF'

             configurations.all {
                 resolutionStrategy {
                 force 'org.bouncycastle:bcprov-jdk18on:1.78'
             }
             }
           EOF
            fi
            echo "Android Gradle Plugin updated"
          fi

      - name: Validate keystore secret (Release only)
        if: inputs.build_type == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 secret required for release builds"
            exit 1
          fi

      - name: Decode keystore (Release only)
        if: inputs.build_type == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/my-release-key.keystore
          
          if [ ! -f "android/app/my-release-key.keystore" ] || [ ! -s "android/app/my-release-key.keystore" ]; then
            echo "Keystore file creation failed"
            exit 1
          fi

      - name: Clean Gradle build cache
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" 2>&1 | tail -5 || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          BUILD_TYPE="${{ inputs.build_type || 'debug' }}"
          
          if [ "$BUILD_TYPE" = "release" ]; then
            echo "Building Release APK..."
            ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" --stacktrace 2>&1 | tee build.log
          else
            echo "Building Debug APK..."
            ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" --stacktrace 2>&1 | tee build.log
          fi
          
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Build failed"
            tail -100 build.log
            exit 1
          fi
          echo "Build completed successfully"
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/my-release-key.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Locate APK file
        id: apk
        run: |
          echo "Searching for APK files..."
          
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" -type f 2>/dev/null | head -1)
          
          if [ -z "$APK_PATH" ]; then
            echo "APK not found"
            find android/app/build/outputs -type f 2>/dev/null || echo "No build outputs"
            exit 1
          fi
          
          APK_NAME=$(basename "$APK_PATH")
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
          
          echo "APK found: $APK_NAME ($APK_SIZE)"

      - name: Validate APK file
        if: success()
        run: |
          APK_FILE="${{ steps.apk.outputs.apk_path }}"
          
          if [ ! -f "$APK_FILE" ]; then
            echo "APK file not accessible"
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s "$APK_FILE" 2>/dev/null || stat -f%z "$APK_FILE")
          
          if [ "$FILE_SIZE" -lt 500000 ]; then
            echo "APK file too small: $FILE_SIZE bytes"
            exit 1
          fi
          
          echo "APK validated"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Build Report
        if: always()
        run: |
          echo "## Android APK Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "Build Type: ${{ inputs.build_type || 'debug' }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.apk.outputs.apk_name }}" ]; then
            echo "APK: ${{ steps.apk.outputs.apk_name }} (${{ steps.apk.outputs.apk_size }})" >> $GITHUB_STEP_SUMMARY
          fi