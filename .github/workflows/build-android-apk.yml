name: Build Android APK

on:
  push:
    branches: [ main, develop, staging ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    env:
      GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4 -Dorg.gradle.vfs.watch=false"
      NODE_ENV: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Install web dependencies
        run: |
          npm install
          npm install -D typescript

          
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      # INSTALL DEPENDENCIES (Mixed from both)
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --production=false

      # BUILD WEB (With full Firebase Secrets support)
      - name: Build web app
        run: pnpm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_VAPID_KEY: ${{ secrets.VITE_VAPID_KEY }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}

      # NATIVE SYNC
      - name: Sync Capacitor
        run: |
          pnpm exec cap add android || true
          pnpm exec cap sync android

      # ✅ STABILITY PATCHES (From your successful past workflow)
      - name: Force Gradle wrapper to 8.6
        run: |
          sed -i 's/gradle-.*-bin.zip/gradle-8.6-bin.zip/g' android/gradle/wrapper/gradle-wrapper.properties

      - name: Upgrade Android Gradle Plugin & Patch bcprov
        run: |
          sed -i 's/com.android.tools.build:gradle:8.2.0/com.android.tools.build:gradle:8.4.2/g' android/build.gradle || true
          echo "configurations.all { resolutionStrategy { force 'org.bouncycastle:bcprov-jdk18on:1.78' } }" >> android/build.gradle

      - name: Align Android SDK to 35
        run: |
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' android/app/build.gradle || true
          sed -i 's/compileSdk 34/compileSdk 35/g' android/app/build.gradle || true

      # FINAL NATIVE BUILD (Using stable flags from success file)
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug \
            --no-daemon \
            --no-build-cache \
            --refresh-dependencies
        env:
          NODE_ENV: production

      # LOCATE & UPLOAD
      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then exit 1; fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          echo "apk_size=$(du -h "$APK_PATH" | cut -f1)" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      - name: Build Report
        if: always()
        run: |
          echo "## 📱 Android APK Build Report" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "**APK:** ${{ steps.apk.outputs.apk_name }} (${{ steps.apk.outputs.apk_size }})" >> $GITHUB_STEP_SUMMARY
          fi
