name: Build Android APK

on:
  push:
    branches: [main, develop, staging]
  workflow_call:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: false
        type: string
        default: 'debug'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        type: choice
        default: 'debug'
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4 -Dorg.gradle.vfs.watch=false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36 and build-tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" "cmdline-tools;latest"

      - name: Install pnpm dependencies
        run: |
          echo "=== Installing pnpm dependencies ==="
          pnpm install --frozen-lockfile || pnpm install
          echo "=== Installation complete ==="

      - name: Verify Capacitor installation
        run: |
          echo "=== Checking Capacitor CLI ==="
          pnpm list @capacitor/cli @capacitor/core @capacitor/android
          pnpm exec cap --version || echo "cap command check completed"

      - name: Verify Capacitor config
        run: |
          if [ -f capacitor.config.ts ] || [ -f capacitor.config.json ]; then
            echo "✓ Capacitor config found"
          else
            echo "✗ capacitor.config not found"
            exit 1
          fi

      - name: Build web application
        run: pnpm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_TURN_USERNAME: ${{ secrets.VITE_TURN_USERNAME }}
          VITE_TURN_CREDENTIAL: ${{ secrets.VITE_TURN_CREDENTIAL }}
          VITE_VAPID_KEY: ${{ secrets.VITE_VAPID_KEY }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL || 'wss://quidec-server.onrender.com' }}

      - name: Clean old Android artifacts
        run: |
          rm -rf android/capacitor-cordova-android-plugins 2>/dev/null || true
          rm -rf android/app/src/main/assets/public 2>/dev/null || true

      - name: Sync Capacitor
        run: pnpm exec cap sync android 2>&1 || echo "Sync completed with warnings"

      - name: Update Gradle wrapper
        run: |
          if [ -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            sed -i 's|distributionUrl=.*|distributionUrl=https://services.gradle.org/distributions/gradle-8.11-all.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          fi

      - name: Update build.gradle versions
        run: |
          # Update AGP to 8.9.1
          if [ -f "android/build.gradle" ]; then
            sed -i "s/id 'com.android.application' version.*/id 'com.android.application' version '8.9.1' apply false/" android/build.gradle
            sed -i "s/id 'com.android.library' version.*/id 'com.android.library' version '8.9.1' apply false/" android/build.gradle
          fi
          
          # Update compileSdk to 36
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/compileSdk 34/compileSdk 36/g' android/app/build.gradle
            sed -i 's/compileSdkVersion 34/compileSdkVersion 36/g' android/app/build.gradle
          fi

      - name: Validate keystore (release only)
        if: inputs.build_type == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 secret required for release builds"
            exit 1
          fi

      - name: Decode keystore
        if: inputs.build_type == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/my-release-key.keystore

      - name: Clean and build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"
          
          BUILD_TYPE="${{ inputs.build_type || 'debug' }}"
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" --stacktrace
          else
            ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" --stacktrace
          fi
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/my-release-key.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename "$APK_PATH")" >> $GITHUB_OUTPUT
          echo "apk_size=$(du -h "$APK_PATH" | cut -f1)" >> $GITHUB_OUTPUT

      - name: Validate APK
        run: |
          APK_FILE="${{ steps.apk.outputs.apk_path }}"
          FILE_SIZE=$(stat -c%s "$APK_FILE")
          if [ "$FILE_SIZE" -lt 500000 ]; then
            echo "APK too small: $FILE_SIZE bytes"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          echo "## Android APK Build" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "Build Type: ${{ inputs.build_type || 'debug' }}" >> $GITHUB_STEP_SUMMARY
          echo "APK: ${{ steps.apk.outputs.apk_name }} (${{ steps.apk.outputs.apk_size }})" >> $GITHUB_STEP_SUMMARY