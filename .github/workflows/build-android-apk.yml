name: Build Android APK

on:
  workflow_call:
    inputs:
      build_type:
        description: 'APK build type'
        required: false
        type: string
        default: 'release'
  push:
    branches:
      - main
      - develop
      - staging

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Xmx2g -Dorg.gradle.daemon=false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ✅ FIX: upgrade to Java 21 (required by AGP 8.4+)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ✅ FIX: install required SDK for androidx 1.15+
      - name: Install Android SDK 35
        run: |
          sdkmanager "platforms;android-35"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Install web dependencies
        run: |
          npm install
          npm install -D typescript
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Build web app
        run: |
          npm run build
      - name: Sync Capacitor
        run: |
          npx cap sync android
      # ✅ FIX: force Gradle 8.6 (wrapper overrides everything else)
      - name: Force Gradle wrapper to 8.6
        run: |
          sed -i 's/gradle-.*-bin.zip/gradle-8.6-bin.zip/g' android/gradle/wrapper/gradle-wrapper.properties
      # ✅ FIX: upgrade Android Gradle Plugin
      - name: Upgrade Android Gradle Plugin
        run: |
          sed -i 's/com.android.tools.build:gradle:8.2.0/com.android.tools.build:gradle:8.4.2/g' android/build.gradle || true
      # ✅ FIX: align compileSdk with dependencies
      - name: Update compileSdk
        run: |
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' android/app/build.gradle || true
          sed -i 's/compileSdk 34/compileSdk 35/g' android/app/build.gradle || true
      # ✅ FIX: clean + isolate Gradle cache
      - name: Prepare clean Gradle environment
        run: |
          rm -rf ~/.gradle
          rm -rf /tmp/gradle-cache
          mkdir -p /tmp/gradle-cache
      # ✅ FIX: bcprov crash workaround
      - name: Patch bcprov issue
        run: |
          echo "configurations.all { resolutionStrategy { force 'org.bouncycastle:bcprov-jdk18on:1.78' } }" >> android/build.gradle
      # ✅ FINAL BUILD (stable flags)
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assemble${{ inputs.build_type == 'debug' && 'Debug' || 'Release' }} \
            --no-daemon \
            --no-build-cache \
            --refresh-dependencies \
            -Dorg.gradle.vfs.watch=false \
            -g /tmp/gradle-cache
      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
      - name: Copy APK to web folder
        run: |
          mkdir -p dist/apk
          cp ${{ steps.apk.outputs.apk_path }} dist/apk/
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      - name: Comment on commit
        if: always()
        run: |
          echo "APK built: ${{ steps.apk.outputs.apk_name }}"