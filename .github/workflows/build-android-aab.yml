name: Build Android App Bundle (AAB)

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        type: string
  push:
    branches:
      - main
      - release/*

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      checks: write

    env:
      GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Java ────────────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # ─── Node ────────────────────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # ─── Android SDK ─────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      # ─── Validate .env ───────────────────────────────────────────────────────
      - name: Validate .env placeholders replaced
        run: |
          ERRORS=0
          if grep -q "your-app.onrender.com" .env 2>/dev/null; then
            echo "❌ VITE_NOTIFY_URL still has placeholder value"
            ERRORS=1
          fi
          if grep -q "YOUR_EXPRESSTURN" .env 2>/dev/null; then
            echo "❌ TURN placeholder found in .env"
            ERRORS=1
          fi
          if [ "$ERRORS" = "1" ]; then exit 1; fi
          echo "✅ .env validated"

      # ─── Install dependencies ────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          NODE_ENV=development pnpm install --frozen-lockfile || (
            echo "⚠️ Frozen lockfile failed, installing with updates"
            NODE_ENV=development pnpm install
          )

      # ─── Build web app ───────────────────────────────────────────────────────
      - name: Build web app
        run: pnpm build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_VAPID_KEY: ${{ secrets.VITE_VAPID_KEY }}
          VITE_NOTIFY_URL: ${{ secrets.VITE_NOTIFY_URL }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL || 'wss://quidec-server.onrender.com' }}

      # ─── Create local.properties ─────────────────────────────────────────────
      - name: Create local.properties
        run: |
          echo "sdk.dir=${{ env.ANDROID_HOME }}" > android/local.properties
          echo "✅ local.properties created"

      # ─── Clean old web assets ───────────────────────────────────────────────
      - name: Clean old web assets
        run: rm -rf android/app/src/main/assets/public

      # ─── Sync Capacitor ──────────────────────────────────────────────────────
      - name: Sync Capacitor
        run: pnpm exec cap sync android

      # ─── Validate keystore ───────────────────────────────────────────────────
      - name: Validate keystore secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ KEYSTORE_BASE64 secret is not set"
            echo "Set the following secrets in GitHub for AAB builds:"
            echo "  - KEYSTORE_BASE64"
            echo "  - KEYSTORE_PASSWORD"
            echo "  - KEY_ALIAS"
            echo "  - KEY_PASSWORD"
            exit 1
          fi
          echo "✅ Keystore secret found"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystore-dir
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystore-dir/release.jks
          echo "✅ Keystore decoded"

      # ─── Build AAB ───────────────────────────────────────────────────────────
      - name: Build App Bundle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g" \
            -Dorg.gradle.workers.max=4
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/keystore-dir/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ─── Locate AAB ──────────────────────────────────────────────────────────
      - name: Locate AAB
        id: aab
        run: |
          AAB_PATH=$(find android/app/build/outputs/bundle -name "*.aab" -type f | head -1)
          if [ -z "$AAB_PATH" ]; then
            echo "❌ AAB not found in outputs!"
            find android/app/build/outputs -type f -name "*.aab" 2>/dev/null || echo "No AAB files found"
            exit 1
          fi
          AAB_SIZE=$(du -h "$AAB_PATH" | cut -f1)
          echo "aab_path=$AAB_PATH" >> $GITHUB_OUTPUT
          echo "aab_name=$(basename $AAB_PATH)" >> $GITHUB_OUTPUT
          echo "aab_size=$AAB_SIZE" >> $GITHUB_OUTPUT
          echo "✅ AAB found: $AAB_PATH ($AAB_SIZE)"

      # ─── Upload artifact ─────────────────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: ${{ steps.aab.outputs.aab_path }}
          retention-days: 60
          if-no-files-found: error

      # ─── Summary ─────────────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## 📦 Android AAB Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.aab.outputs.aab_name }}" ]; then
            echo "| AAB | ${{ steps.aab.outputs.aab_name }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Size | ${{ steps.aab.outputs.aab_size }} |" >> $GITHUB_STEP_SUMMARY
          fi
