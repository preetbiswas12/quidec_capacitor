name: Build Android App Bundle (AAB)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'web/src/**'
      - 'web/package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      checks: write

    env:
      GRADLE_OPTS: "-Xmx2g -Dorg.gradle.daemon=false"
      NODE_ENV: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.m2/repository
            ~/.npm
            node_modules
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          sdkmanager "platforms;android-35"
          sdkmanager "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-disabled: false

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Type check
        run: |
          cd web
          npx tsc --noEmit
        continue-on-error: true

      - name: Build web app
        run: |
          cd web
          npm run build
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL || 'wss://quidec-server.onrender.com' }}

      - name: Sync Capacitor
        run: |
          cd web
          npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ Error: KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          cd web
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystore.jks
          echo "✅ Keystore decoded"

      - name: Update build config
        run: |
          cd web/android
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' app/build.gradle || true
          sed -i 's/compileSdk 34/compileSdk 35/g' app/build.gradle || true

      - name: Build App Bundle
        run: |
          cd web/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            --no-daemon \
            --no-build-cache \
            --parallel \
            -g /tmp/gradle-cache \
            -Dorg.gradle.jvmargs="-Xmx2g" \
            -Dorg.gradle.workers.max=4
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/web/android/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Locate AAB
        id: aab
        run: |
          AAB_PATH=$(find web/android/app/build/outputs/bundle -name "*.aab" -type f | head -1)
          if [ -z "$AAB_PATH" ]; then
            echo "❌ AAB not found!"
            exit 1
          fi
          echo "aab_path=$AAB_PATH" >> $GITHUB_OUTPUT
          echo "aab_name=$(basename $AAB_PATH)" >> $GITHUB_OUTPUT
          echo "aab_size=$(du -h $AAB_PATH | cut -f1)" >> $GITHUB_OUTPUT

      - name: Generate AAB report
        run: |
          echo "## 📦 App Bundle Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Bundle Name:** ${{ steps.aab.outputs.aab_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bundle Size:** ${{ steps.aab.outputs.aab_size }}" >> $GITHUB_STEP_SUMMARY
          echo "**Ready for:** Google Play Store" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** $(date)" >> $GITHUB_STEP_SUMMARY

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: ${{ steps.aab.outputs.aab_path }}
          retention-days: 60
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.aab.outputs.aab_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
