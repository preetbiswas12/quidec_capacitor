name: Build Android AAB

on:
  push:
    branches: [main, develop]
  workflow_call:
    inputs:
      version:
        description: 'App version'
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g., 1.0.1)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version
        if: inputs.version != ''
        run: |
          VERSION="${{ inputs.version }}"
          CODE=$(echo "$VERSION" | awk -F. '{print $1 * 10000 + $2 * 100 + $3}')
          sed -i "s/versionCode .*/versionCode $CODE/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"$VERSION\"/" android/app/build.gradle

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/my-release-key.keystore
          fi

      - name: Decode google-services.json
        if: env.GOOGLE_SERVICES_JSON != ''
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json

      - name: Build web assets
        run: pnpm build

      - name: Sync Capacitor
        run: pnpm cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build AAB
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 7
          if-no-files-found: error
