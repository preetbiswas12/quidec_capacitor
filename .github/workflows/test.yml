name: Test & Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Install dependencies (fallback)
        if: failure()
        run: |
          echo "⚠️ Frozen lockfile failed, installing with updates"
          pnpm install
          git add pnpm-lock.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git commit -m "chore: update pnpm-lock.yaml" || true

      - name: Type check
        id: typecheck
        run: pnpm exec tsc --noEmit
        continue-on-error: true

      - name: Lint code
        id: lint
        run: pnpm run lint
        continue-on-error: true

      - name: Format check
        id: format
        run: pnpm exec prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}"
        continue-on-error: true

      - name: Report linting results
        if: always()
        run: |
          echo "## 🔍 Linting Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ steps.typecheck.outcome == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ${{ steps.lint.outcome == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Prettier | ${{ steps.format.outcome == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm           # ← MUST COME FIRST
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Run npm audit
        id: audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Report security results
        if: always()
        run: |
          echo "## 🔒 Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.audit.outcome }}" = "success" ]; then
            echo "✅ No moderate or high severity vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Review pnpm audit output above" >> $GITHUB_STEP_SUMMARY
          fi

  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Install dependencies (fallback)
        if: failure()
        run: |
          echo "⚠️ Frozen lockfile failed, installing with updates"
          pnpm install
          git add pnpm-lock.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git commit -m "chore: update pnpm-lock.yaml" || true

      - name: Build web app
        id: build
        run: pnpm build
        env:
          VITE_SERVER_URL: 'wss://quidec-server.onrender.com'

      - name: Verify build output
        if: success()
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build successful"
            DIST_SIZE=$(du -sh dist | cut -f1)
            echo "Build size: $DIST_SIZE"
          else
            echo "❌ Build failed - dist directory not found"
            exit 1
          fi

      - name: Generate build report
        if: always()
        run: |
          echo "## 🏗️ Build Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo "✅ Build succeeded" >> $GITHUB_STEP_SUMMARY
            if [ -d "dist" ]; then
              echo "**Build Size:** $(du -sh dist | cut -f1)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ Build failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ github.sha }}
          path: dist
          retention-days: 7
          if-no-files-found: error

  summary:
    runs-on: ubuntu-latest
    needs: [lint, security, build-test]
    if: always()

    steps:
      - name: Generate workflow summary
        run: |
          echo "## ✨ Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Test | ${{ needs.build-test.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY