name: Test & Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Type check
        run: |
          cd web
          npx tsc --noEmit
        continue-on-error: true

      - name: Lint
        run: |
          cd web
          npm run lint
        continue-on-error: true

      - name: Format check
        run: |
          cd web
          npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}" || true
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: |
          cd web
          npm audit --audit-level=moderate || true

      - name: Dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          path: 'web'
          format: 'JSON'
        continue-on-error: true

  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Build web app
        run: |
          cd web
          npm run build
        env:
          VITE_SERVER_URL: 'wss://quidec-server.onrender.com'

      - name: Check build output
        run: |
          if [ -d "web/dist" ]; then
            echo "✅ Build successful"
            echo "Build size: $(du -sh web/dist | cut -f1)"
          else
            echo "❌ Build failed - dist directory not found"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ github.sha }}
          path: web/dist
          retention-days: 7
