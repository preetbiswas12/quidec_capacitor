name: Code Quality & Build Verification

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        node-version: ['18.x', '20.x']
      fail-fast: false

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        id: typecheck
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Format check
        id: format
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}"
        continue-on-error: true

      - name: Lint code
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: Build verification
        id: build
        run: npm run build

      - name: Generate quality report
        if: always()
        run: |
          {
            echo "## 📊 Code Quality Report (Node ${{ matrix.node-version }})"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| TypeScript | ${{ steps.typecheck.outcome == 'success' && '✅' || '⚠️' }} |"
            echo "| Format | ${{ steps.format.outcome == 'success' && '✅' || '⚠️' }} |"
            echo "| Lint | ${{ steps.lint.outcome == 'success' && '✅' || '⚠️' }} |"
            echo "| Build | ${{ steps.build.outcome == 'success' && '✅' || '❌' }} |"
          } >> $GITHUB_STEP_SUMMARY

  pr-comment:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'pull_request' && always()

    permissions:
      pull-requests: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ needs.verify.result }}' === 'success' ? '✅ Passed' : '⚠️ Check Details';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 Code Quality Check\n\n${buildStatus}\n\nSee workflow run for detailed results.`
            })
        continue-on-error: true