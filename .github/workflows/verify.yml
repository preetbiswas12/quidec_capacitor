name: Code Quality & Build Verification

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        node-version: ['20.x']
      fail-fast: false

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Install dependencies (fallback)
        if: failure()
        run: |
          echo "⚠️ Frozen lockfile failed, installing with updates"
          pnpm install
          git add pnpm-lock.yaml
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git commit -m "chore: update pnpm-lock.yaml" || true

      - name: Type check
        id: typecheck
        run: pnpm exec tsc --noEmit
        continue-on-error: true

      - name: Format check
        id: format
        run: pnpm exec prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}"
        continue-on-error: true

      - name: Lint code
        id: lint
        run: pnpm run lint
        continue-on-error: true

      - name: Build verification
        id: build
        run: pnpm build

      - name: Generate quality report
        if: always()
        run: |
          echo "## 📊 Code Quality Report (Node ${{ matrix.node-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ steps.typecheck.outcome == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Format | ${{ steps.format.outcome == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ steps.lint.outcome == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.build.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

  pr-comment:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'pull_request' && always()

    permissions:
      pull-requests: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ needs.verify.result }}' === 'success' ? '✅ Passed' : '⚠️ Check Details';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 Code Quality Check\n\n${buildStatus}\n\nSee workflow run for detailed results.`
            })
        continue-on-error: true