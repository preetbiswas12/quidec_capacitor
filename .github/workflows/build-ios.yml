name: Build iOS

on:
  push:
    branches: [main, develop]
  workflow_call:
    inputs:
      build_config:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: string
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options: [Debug, Release]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm build

      - name: Sync Capacitor
        run: pnpm cap sync ios

      - name: Decode GoogleService-Info.plist
        if: ${{ env.GOOGLE_SERVICE_INFO_PLIST != '' }}
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/App/App/GoogleService-Info.plist

      - name: Build iOS
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration ${{ inputs.build_config || 'Release' }} \
            -archivePath build/App.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            archive

      - name: Export IPA
        if: (inputs.build_config || 'Release') == 'Release'
        env:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            -exportPath build/output \
            -allowProvisioningUpdates || true

      - name: Upload iOS Archive
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: build/output/*.ipa
          retention-days: 7
          if-no-files-found: ignore
