version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps):"
    groups:
      firebase:
        patterns: ["firebase", "@firebase/*", "@capacitor-firebase/*"]
        update-types: ["minor", "patch"]
      capacitor:
        patterns: ["@capacitor/*"]
        update-types: ["minor", "patch"]
      radix:
        patterns: ["@radix-ui/*"]
        update-types: ["minor", "patch"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["ci"]
    commit-message:
      prefix: "ci(deps):"
