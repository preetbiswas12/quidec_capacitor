<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">

  <meta name="description" content="A real-time encrypted chat application with friends and messaging">
  <meta name="theme-color" content="#1B3C53">
  <meta name="color-scheme" content="dark">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Quidec">
  
  <!-- iOS icons -->
  <link rel="apple-touch-icon" href="/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-192x192.png">
  
  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Quidec">

  <div id="root"></div>
  
  <!-- Service worker registration for PWA -->
  <script>
    if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
      navigator.serviceWorker.register('/sw.js').catch(() => {
        console.log('Service Worker registration failed')
      })
    }
  </script>
