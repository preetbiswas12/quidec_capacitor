<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  
  <!-- App metadata -->
  <title>Quidec Chat - Encrypted Real-time Messaging</title>
  <meta name="description" content="A real-time encrypted chat application with friends and messaging">
  <meta name="theme-color" content="#1B3C53">
  <meta name="color-scheme" content="dark">
  
  <!-- Apple specific -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Quidec">
  
  <!-- iOS icons -->
    <link rel="apple-touch-icon" href="/icon.svg">
  
  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Quidec">
  
  <!-- Icon and manifest -->
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  
  <!-- Capacitor -->
  <script src="https://cdn.jsdelivr.net/npm/@capacitor/core@latest/dist/capacitor.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@capacitor/app@latest/dist/plugin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@capacitor/device@latest/dist/plugin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@capacitor/network@latest/dist/plugin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@capacitor/push-notifications@latest/dist/plugin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@capacitor/local-notifications@latest/dist/plugin.js"></script>
  
  <!-- Performance optimization -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://quidec-server.onrender.com">
  
  <!-- Security headers -->
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: blob: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://apis.google.com https://*.googleapis.com https://*.firebasedatabase.app blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https: wss: data: blob:;">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Service worker registration for PWA -->
  <script>
    if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
      navigator.serviceWorker.register('/sw.js').catch(() => {
        console.log('Service Worker registration failed')
      })
    }
  </script>
</body>
</html>
