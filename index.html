<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  
  <!-- App metadata -->
  <title>Quidec - Encrypted Real-time Messaging</title>
  <meta name="description" content="Quidec - A real-time encrypted chat application">
  <meta name="theme-color" content="#25D366" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="light dark">
  
  <!-- Apple specific -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Quidec">
  
  <!-- iOS icons -->
  <link rel="apple-touch-icon" href="/icon-512.png">
  
  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Quidec">
  
  <!-- Icon and manifest -->
  <link rel="icon" href="/icon-512.png" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  
  <!-- Capacitor core (pinned versions, loaded via module for security) -->
  <script type="module">
    // Capacitor is loaded via npm imports in the app bundle, not from CDN.
    // These CDN scripts are fallbacks only for PWA mode.
  </script>
  
  <!-- Performance optimization -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://quidec-server.onrender.com">
  
  <!-- Security headers -->
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'wasm-unsafe-eval' 'sha256-V2xO2k7NSR8rr8OJVZ8N4iXEdcEjnwx+2fujFOxU5s0=' https://cdn.jsdelivr.net https://apis.google.com https://*.googleapis.com https://*.firebaseio.com https://*.firebasedatabase.app blob:;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https: blob:;
    connect-src 'self' https: wss: blob: data: https://*.firebaseio.com https://*.firebasedatabase.app https://*.googleapis.com https://*.firebase.com;
    worker-src 'self' blob:;
    frame-src 'none';
    object-src 'none';
  ">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <!-- Service worker registration for PWA -->
  <script>
    if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
      navigator.serviceWorker.register('/sw.js').catch(function() {})
    }
  </script>
</body>
</html>
